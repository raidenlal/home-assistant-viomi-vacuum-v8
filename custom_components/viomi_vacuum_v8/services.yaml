clean_zone:
  description: Clean selected zone(s) with the specified number of repeats.
  fields:
    entity_id:
      description: Vacuum entity ID.
      example: "vacuum.viomi_vacuum_v8"
    zone:
      description: "Array of zones. Each zone is [x1, y1, x2, y2] in meters relative to the dock."
      example: "[[-1,-1,2,2]]"
    repeats:
      description: Number of cleaning repeats (1-3).
      example: "1"

clean_area:
  description: Clean selected area(s) defined by 4 corner points.
  fields:
    entity_id:
      description: Vacuum entity ID.
      example: "vacuum.viomi_vacuum_v8"
    area:
      description: "Array of areas. Each area is 8 floats (4 x,y pairs) in meters relative to the dock."
      example: "[[-2.75,-1.3,-2.75,-5.5,4.3,-5.5,0,-1.3]]"
    repeats:
      description: Number of cleaning repeats (1-3).
      example: "1"

clean_point:
  description: Spot-clean around a specific coordinate.
  fields:
    entity_id:
      description: Vacuum entity ID.
      example: "vacuum.viomi_vacuum_v8"
    point:
      description: "[x, y] coordinate in meters relative to the dock."
      example: "[-2.75,-1.3]"

clean_segment:
  description: Clean specified room segment(s) by ID.
  fields:
    entity_id:
      description: Vacuum entity ID.
      example: "vacuum.viomi_vacuum_v8"
    segments:
      description: Segment ID or list of segment IDs.
      example: "[10,11]"

xiaomi_clean_zone:
  description: "Legacy alias for clean_zone (deprecated, use clean_zone instead)."
  fields:
    entity_id:
      description: Vacuum entity ID.
      example: "vacuum.viomi_vacuum_v8"
    zone:
      description: "Array of zones. Each zone is [x1, y1, x2, y2] in meters."
      example: "[[-1,-1,2,2]]"
    repeats:
      description: Number of cleaning repeats (1-3).
      example: "1"

xiaomi_clean_point:
  description: "Legacy alias for clean_point (deprecated, use clean_point instead)."
  fields:
    entity_id:
      description: Vacuum entity ID.
      example: "vacuum.viomi_vacuum_v8"
    point:
      description: "[x, y] coordinate in meters."
      example: "[-1,2]"
